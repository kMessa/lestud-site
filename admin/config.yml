backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: images
public_folder: /images

collections:
  - name: portfolio
    label: Portfolio
    files:
      - label: Projets
        name: projets
        file: data/portfolio.json
        fields:
          - label: Projets
            name: items
            widget: list
            add_to_top: true
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Catégorie, name: tag, widget: string }
              - { label: Image, name: image, widget: image }
              - { label: Texte alternatif (description), name: alt, widget: string }
